Categories:
  - Internet
  - Security
License: MIT
AuthorName: Anton Tranelis
AuthorEmail: info@real-life.org
WebSite: https://web-of-trust.de
SourceCode: https://github.com/real-life-org/web-of-trust
IssueTracker: https://github.com/real-life-org/web-of-trust/issues
Changelog: https://github.com/real-life-org/web-of-trust/releases

AutoName: Web of Trust

RepoType: git
Repo: https://github.com/real-life-org/web-of-trust.git

Builds:
  - versionName: 0.2.1
    versionCode: 3
    commit: 7b689e85c1089791c86483e58b72059d71d7fc93
    subdir: apps/demo/android
    sudo:
      - apt-get update
      - apt-get install -y ca-certificates curl gnupg
      - mkdir -p /etc/apt/keyrings
      - curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg
        --dearmor -o /etc/apt/keyrings/nodesource.gpg
      - echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_22.x
        nodistro main" > /etc/apt/sources.list.d/nodesource.list
      - apt-get update
      - apt-get install -y nodejs
      - corepack enable
      - corepack prepare pnpm@9.15.4 --activate
    init: "cd ../../..\npnpm install --frozen-lockfile\nexport VITE_BASE_PATH=/ VITE_UPDATE_SERVER_URL=https://web-of-trust.de
      VITE_UPDATE_CHANNEL=android-foss\npnpm build\ncd apps/demo\nnpx cap sync android"
    gradle:
      - fdroid
    output: app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk
    scanignore:
      - apps/demo/android/app/src/main/assets/public/assets
    scandelete:
      - node_modules
      - apps/demo/dist
      - apps/benchmark/dist
    ndk: r27c

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v
UpdateCheckData: apps/demo/android/version.properties|VERSION_CODE=(\d+)|.|VERSION_NAME=(.+)
CurrentVersion: 0.2.1
CurrentVersionCode: 3
