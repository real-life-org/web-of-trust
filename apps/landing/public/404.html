<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Web of Trust</title>
    <script>
      // GitHub Pages SPA fallback
      // /demo paths → redirect to demo app directly
      // all other paths → store in sessionStorage, redirect to landing index.html
      var p = location.pathname + location.search + location.hash;
      if (p.startsWith('/demo')) {
        // Demo app has its own index.html — navigate directly
        var target = p === '/demo' ? '/demo/' : p;
        location.replace(target);
      } else {
        sessionStorage.setItem('spa-redirect', p);
        location.replace('/');
      }
    </script>
  </head>
  <body></body>
</html>
