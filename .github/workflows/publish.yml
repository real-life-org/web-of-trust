name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          # Node 24 → npm >= 11.5.1: Voraussetzung für npm Trusted Publishing
          # (OIDC-Provenance). Node 22/npm 10 schlug beim 0.1.4-Publish fehl.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @web_of_trust/core build
          pnpm --filter @web_of_trust/adapter-yjs build
          pnpm --filter @web_of_trust/adapter-automerge build

      # Publish-Fehler dürfen den Lauf NICHT grün lassen (das frühere
      # `|| echo` hat monatelang stille Auth-404s maskiert). Einziger
      # tolerierter Fall: die Version existiert bereits (idempotenter Re-Run,
      # z.B. wenn ein app-*-Release den Workflow erneut triggert).
      - name: Publish @web_of_trust/core
        working-directory: packages/wot-core
        run: |
          out=$(pnpm publish --access public --provenance --no-git-checks 2>&1) || {
            echo "$out"
            echo "$out" | grep -qiE "cannot publish over|previously published|already exists" \
              && echo "::notice::Version bereits publiziert — ok (idempotent)" \
              || exit 1
          }
          echo "$out" | tail -3

      - name: Publish @web_of_trust/adapter-yjs
        working-directory: packages/adapter-yjs
        run: |
          out=$(pnpm publish --access public --provenance --no-git-checks 2>&1) || {
            echo "$out"
            echo "$out" | grep -qiE "cannot publish over|previously published|already exists" \
              && echo "::notice::Version bereits publiziert — ok (idempotent)" \
              || exit 1
          }
          echo "$out" | tail -3

      - name: Publish @web_of_trust/adapter-automerge
        working-directory: packages/adapter-automerge
        run: |
          out=$(pnpm publish --access public --provenance --no-git-checks 2>&1) || {
            echo "$out"
            echo "$out" | grep -qiE "cannot publish over|previously published|already exists" \
              && echo "::notice::Version bereits publiziert — ok (idempotent)" \
              || exit 1
          }
          echo "$out" | tail -3
