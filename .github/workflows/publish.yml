name: Publish Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release-Tag, an das die tgz-Assets gehängt werden'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    # Kein npm-Publish mehr: 2FA/Trusted-Publisher-Setup auf npmjs.com ist
    # blockiert (Passkey wird nicht akzeptiert). Die Pakete werden stattdessen
    # als tgz-Assets ans GitHub-Release gehängt — RLS konsumiert genau diese
    # Tarball-URLs als Dependencies.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Beim manuellen Re-Run MUSS auch der Checkout auf dem Ziel-Tag
          # stehen — sonst wuerden Tarballs vom main-HEAD mit --clobber die
          # Assets eines aelteren Releases ueberschreiben.
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build all packages
        run: |
          pnpm --filter @web_of_trust/core build
          pnpm --filter @web_of_trust/adapter-yjs build
          pnpm --filter @web_of_trust/adapter-automerge build

      - name: Pack tarballs
        run: |
          mkdir -p /tmp/tgz
          for dir in packages/wot-core packages/adapter-yjs packages/adapter-automerge; do
            pnpm -C "$dir" pack --pack-destination /tmp/tgz
          done
          ls -l /tmp/tgz

      # Fehler dürfen den Lauf NICHT grün lassen (das frühere `|| echo` hat
      # monatelang stille Auth-404s maskiert). --clobber macht den Upload
      # idempotent (Re-Run ersetzt vorhandene Assets).
      - name: Upload tarballs to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
        run: gh release upload "$TAG" /tmp/tgz/*.tgz --clobber
