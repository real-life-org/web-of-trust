name: Deploy vNext Demo to Cloudflare Pages

on:
  push:
    branches: [spec-vnext]
    paths:
      - 'apps/demo/**'
      - 'packages/wot-core/**'
      - 'packages/adapter-yjs/**'
      - 'packages/adapter-automerge/**'
      - '.github/workflows/deploy-vnext.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-vnext-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @web_of_trust/core build
          pnpm --filter @web_of_trust/adapter-yjs build
          pnpm --filter @web_of_trust/adapter-automerge build

      - name: Run targeted tests
        run: |
          pnpm --filter @web_of_trust/core test
          pnpm --filter demo test

      - name: Build vNext demo
        run: pnpm --filter demo build
        env:
          VITE_BASE_PATH: /
          VITE_UPDATE_SERVER_URL: https://web-of-trust-vnext.pages.dev
          VITE_STORAGE_NAMESPACE: wot-vnext

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4.59.2 pages deploy apps/demo/dist --project-name="${{ vars.CLOUDFLARE_PROJECT_NAME }}" --branch="${GITHUB_REF_NAME}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
