name: Deploy Landing + Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/demo/**'
      - 'apps/landing/**'
      - 'apps/benchmark/**'
      - 'packages/wot-core/**'
      - 'packages/adapter-yjs/**'
      - 'packages/adapter-automerge/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: 'OTA rollback: release tag to restore (e.g. ota-a3f9c12). Leave empty for normal deploy.'
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: |
          pnpm --filter @web_of_trust/core build
          pnpm --filter @web_of_trust/adapter-yjs build
          pnpm --filter @web_of_trust/adapter-automerge build

      - name: Run tests
        run: pnpm test

      - name: Build landing
        run: pnpm --filter landing build

      - name: Set SHORT_SHA
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # OTA bundles: VITE_BASE_PATH=/ (native app loads from capacitor://localhost/)
      - name: Build OTA bundle (ios)
        run: pnpm --filter demo build
        env:
          VITE_BASE_PATH: /
          VITE_UPDATE_SERVER_URL: https://web-of-trust.de
          VITE_UPDATE_CHANNEL: ios

      - name: Zip iOS bundle
        run: (cd apps/demo/dist && zip -r "../../../bundle-ios-${SHORT_SHA}.zip" .)

      - name: Build OTA bundle (android)
        run: pnpm --filter demo build
        env:
          VITE_BASE_PATH: /
          VITE_UPDATE_SERVER_URL: https://web-of-trust.de
          VITE_UPDATE_CHANNEL: android

      - name: Zip Android bundle
        run: cd apps/demo/dist && zip -r "../../../bundle-android-${SHORT_SHA}.zip" .

      - name: Build OTA bundle (android-foss)
        run: pnpm --filter demo build
        env:
          VITE_BASE_PATH: /
          VITE_UPDATE_SERVER_URL: https://web-of-trust.de
          VITE_UPDATE_CHANNEL: android-foss
          # TODO: add FOSS-specific env vars here once push notifications are implemented

      - name: Zip Android FOSS bundle
        run: cd apps/demo/dist && zip -r "../../../bundle-android-foss-${SHORT_SHA}.zip" .

      # Web deployment build: VITE_BASE_PATH=/demo/ (served at web-of-trust.de/demo/)
      - name: Build demo for Pages
        run: pnpm --filter demo build
        env:
          VITE_BASE_PATH: /demo/
          VITE_UPDATE_SERVER_URL: https://web-of-trust.de

      - name: Build benchmark with base path
        run: pnpm --filter benchmark build
        env:
          VITE_BASE_PATH: /benchmark/

      - name: Create GitHub Release with OTA bundles
        if: inputs.rollback_tag == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "ota-${SHORT_SHA}" \
            --title "OTA ${SHORT_SHA}" \
            --notes "Automatic OTA release from commit ${SHORT_SHA}" \
            bundle-ios-${SHORT_SHA}.zip \
            bundle-android-${SHORT_SHA}.zip \
            bundle-android-foss-${SHORT_SHA}.zip

      - name: Generate latest.json (normal deploy)
        if: inputs.rollback_tag == ''
        run: |
          REPO="${{ github.repository }}"
          for channel in ios android android-foss; do
            mkdir -p combined/updates/${channel}
            printf '{"bundleId":"%s","url":"%s"}\n' \
              "${SHORT_SHA}" \
              "https://github.com/${REPO}/releases/download/ota-${SHORT_SHA}/bundle-${channel}-${SHORT_SHA}.zip" \
              > combined/updates/${channel}/latest.json
          done

      - name: Generate latest.json (rollback)
        if: inputs.rollback_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ inputs.rollback_tag }}"
          BUNDLE_ID="${TAG#ota-}"
          for channel in ios android android-foss; do
            mkdir -p combined/updates/${channel}
            printf '{"bundleId":"%s","url":"%s"}\n' \
              "${BUNDLE_ID}" \
              "https://github.com/${REPO}/releases/download/${TAG}/bundle-${channel}-${BUNDLE_ID}.zip" \
              > combined/updates/${channel}/latest.json
          done
          echo "Rolling back OTA to ${TAG}"

      - name: Combine builds
        run: |
          cp -r apps/landing/dist/* combined/
          mkdir -p combined/demo
          cp -r apps/demo/dist/* combined/demo/
          mkdir -p combined/benchmark
          cp -r apps/benchmark/dist/* combined/benchmark/

      - name: SPA fallback (GitHub Pages serves 404.html on unknown routes)
        run: |
          printf '<!DOCTYPE html><html><head><meta charset="utf-8"><script>var p=location.pathname+location.search+location.hash;var t=p.startsWith("/demo")?"/demo/":"/";sessionStorage.setItem("spa-redirect",p);location.replace(t);</script></head><body></body></html>' \
            > combined/404.html
          cp combined/404.html combined/demo/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
